<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IV 藥物相容性查詢</title>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    :root {
      --primary: #0f6b8f;
      --primary-dark: #084f6a;
      --bg: #f5f8fa;
      --card: #ffffff;
      --border: #d9e2e7;
      --text: #1f2933;
      --muted: #6b7280;
      --success: #0f766e;
      --danger: #b91c1c;
      --warning: #92400e;
      --unknown: #4b5563;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Noto Sans TC", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 980px;
      margin: 32px auto;
      padding: 20px;
    }

    .header {
      border-left: 6px solid var(--primary);
      padding-left: 18px;
      margin-bottom: 24px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      color: var(--primary-dark);
    }

    .header p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(15, 107, 143, 0.08);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
    }

    .input-wrap {
      position: relative;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--primary-dark);
    }

    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 107, 143, 0.15);
    }

    .suggestions {
      display: none;
      position: absolute;
      z-index: 9999;
      width: 100%;
      left: 0;
      margin-top: 8px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .suggestion-item {
      padding: 11px 12px;
      border-bottom: 1px solid #eef2f5;
      cursor: pointer;
      font-size: 14px;
    }

    .suggestion-item:hover {
      background: #edf7fb;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .drug-brand {
      font-weight: 800;
      color: var(--text);
    }

    .drug-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
      line-height: 1.4;
    }

    .actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-dark);
    }

    .btn-secondary {
      background: #e5edf1;
      color: var(--primary-dark);
    }

    .status {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .result {
      margin-top: 24px;
      display: none;
    }

    .result-box {
      border-radius: 16px;
      padding: 22px;
      border: 1px solid var(--border);
      background: #fbfdfe;
    }

    .result-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--primary-dark);
    }

    .pair {
      font-size: 15px;
      color: var(--text);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 16px;
    }

    .compatible {
      background: #d1fae5;
      color: var(--success);
    }

    .incompatible {
      background: #fee2e2;
      color: var(--danger);
    }

    .caution {
      background: #fef3c7;
      color: var(--warning);
    }

    .unknown {
      background: #e5e7eb;
      color: var(--unknown);
    }

    .info-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 14px;
    }

    .info-table th {
      text-align: left;
      width: 140px;
      color: var(--muted);
      padding: 8px 0;
      vertical-align: top;
    }

    .info-table td {
      padding: 8px 0;
      color: var(--text);
    }

    .alert {
      margin-top: 22px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid #fed7aa;
      font-size: 14px;
      line-height: 1.6;
    }

    .footer-note {
      margin-top: 18px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>IV 藥物相容性查詢</h1>
      <p>可輸入處置代碼、商品名或成分名。資料來源：(1)仿單 (2)MicroMedex (3)Handbook on Injectable Drugs (4)UpToDate。</p>
    </div>

    <div class="card">
      <div class="grid">
        <div class="input-wrap">
          <label for="drugInput1">藥物 1</label>
          <input id="drugInput1" type="text"
            placeholder="例如：vanc / Vanlyo / VANI10"
            autocomplete="off" />
          <div id="suggestions1" class="suggestions"></div>
        </div>

        <div class="input-wrap">
          <label for="drugInput2">藥物 2</label>
          <input id="drugInput2" type="text"
            placeholder="例如：N4 / cef / 處置代碼"
            autocomplete="off" />
          <div id="suggestions2" class="suggestions"></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn-primary" onclick="checkCompatibility()">查詢相容性</button>
        <button class="btn-secondary" onclick="resetForm()">清除</button>
      </div>

      <div id="status" class="status">資料載入中...</div>
      <div id="result" class="result"></div>

      <div class="alert">
        本工具僅作為院內藥物相容性快速查詢輔助，資料來源為MicroMedex。
        若涉及特殊濃度、稀釋液、Y-site、TPN、化療藥、血品或高風險藥品，
        請諮詢藥劑科（ext 3322、3323或值班ext 2125）或藥品仿單做確認。
      </div>

      <div class="footer-note">
        資料更新：2025.05.03。
      </div>
    </div>
  </div>

<script>
const sheetId = "1D9-wx6Zq-gIEUKi0opvL6FjL_hvrD5HsNkLR-q3kXxc";
const csvUrl =
  `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`;

let rawRows = [];
let drugIndex = [];
let compatibilityMap = {};
let selectedDrug1 = null;
let selectedDrug2 = null;
let resolvedColumns = null;

function clean(value) {
  return String(value ?? "").trim();
}

function normalizeText(value) {
  return clean(value)
    .toLowerCase()
    .normalize("NFKC")
    .replace(/\s+/g, " ");
}

function normalizeKey(value) {
  return clean(value)
    .toLowerCase()
    .normalize("NFKC")
    .replace(/\s+/g, "")
    .replace(/[＿_－\-–—]/g, "")
    .replace(/[()（）]/g, "");
}

function escapeHtml(text) {
  return String(text || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function findColumn(headers, candidates, occurrence = 1) {
  const normalizedHeaders = headers.map(h => ({
    original: h,
    normalized: normalizeKey(h)
  }));

  const normalizedCandidates = candidates.map(normalizeKey);

  const matches = normalizedHeaders.filter(h =>
    normalizedCandidates.some(c =>
      h.normalized === c ||
      h.normalized.includes(c) ||
      c.includes(h.normalized)
    )
  );

  return matches[occurrence - 1]?.original || "";
}

function resolveColumns(rows) {
  const headers = Object.keys(rows[0] || {});

  const codeCols = headers.filter(h => normalizeKey(h).includes("處置代碼"));
  const brandCols = headers.filter(h =>
    normalizeKey(h).includes("商品名") ||
    normalizeKey(h).includes("brand")
  );
  const genericCols = headers.filter(h =>
    normalizeKey(h).includes("成分名") ||
    normalizeKey(h).includes("generic") ||
    normalizeKey(h).includes("ingredient")
  );

  return {
    code1: codeCols[0] || findColumn(headers, ["處置代碼1", "code1", "drug1code"]),
    code2: codeCols[1] || findColumn(headers, ["處置代碼2", "code2", "drug2code"]),
    brand1: brandCols[0] || findColumn(headers, ["Drug 1 商品名", "商品名1", "brand1"]),
    brand2: brandCols[1] || findColumn(headers, ["Drug 2 商品名", "商品名2", "brand2"]),
    generic1: genericCols[0] || findColumn(headers, ["Drug 1 成分名", "成分名1", "generic1"]),
    generic2: genericCols[1] || findColumn(headers, ["Drug 2 成分名", "成分名2", "generic2"]),
    compatible: findColumn(headers, ["Compatible", "Compatibility", "相容性", "相容"]),
    updatedAt: findColumn(headers, ["UpdatedAt", "Updated At", "更新日期", "最後更新日期"]),
    source: findColumn(headers, ["Source", "資料來源"]),
    note: findColumn(headers, ["Note", "備註", "說明"])
  };
}

async function loadData() {
  try {
    const response = await fetch(csvUrl + "&cacheBust=" + Date.now());
    const csvText = await response.text();

    Papa.parse(csvText, {
      header: true,
      skipEmptyLines: true,
      transformHeader: h => clean(h),
      complete: function(results) {
        rawRows = results.data;
        resolvedColumns = resolveColumns(rawRows);

        buildIndexes(rawRows);

        document.getElementById("status").textContent =
          `資料載入完成：${rawRows.length.toLocaleString()} 筆相容性資料；` +
          `藥品索引 ${drugIndex.length.toLocaleString()} 筆`;

        console.log("Resolved columns:", resolvedColumns);
        console.log("Drug index sample:", drugIndex.slice(0, 10));
      },
      error: function(error) {
        showStatusError("CSV 解析失敗：" + error.message);
      }
    });
  } catch (error) {
    showStatusError("無法讀取 Google Sheet CSV。請確認 Sheet 已開放檢視權限。");
    console.error(error);
  }
}

function showStatusError(message) {
  document.getElementById("status").textContent = message;
}

function get(row, colName) {
  return clean(row[colName]);
}

function buildIndexes(rows) {
  const drugMap = new Map();
  compatibilityMap = {};

  rows.forEach(row => {
    const d1 = {
      code: get(row, resolvedColumns.code1),
      brand: get(row, resolvedColumns.brand1),
      generic: get(row, resolvedColumns.generic1)
    };

    const d2 = {
      code: get(row, resolvedColumns.code2),
      brand: get(row, resolvedColumns.brand2),
      generic: get(row, resolvedColumns.generic2)
    };

    addDrug(drugMap, d1);
    addDrug(drugMap, d2);

    const code1 = normalizeCode(d1.code);
    const code2 = normalizeCode(d2.code);

    if (code1 && code2) {
      const resultObj = {
        compatible: get(row, resolvedColumns.compatible) || "無資料",
        updatedAt: get(row, resolvedColumns.updatedAt) || "",
        source: get(row, resolvedColumns.source) || "Micromedex",
        note: get(row, resolvedColumns.note) || ""
      };

      compatibilityMap[makeKey(code1, code2)] = resultObj;
      compatibilityMap[makeKey(code2, code1)] = resultObj;
    }
  });

  drugIndex = Array.from(drugMap.values());
}

function normalizeCode(code) {
  return clean(code).toUpperCase();
}

function addDrug(map, drug) {
  if (!drug.code && !drug.brand && !drug.generic) return;

  const key = normalizeCode(drug.code) || normalizeText(drug.brand) || normalizeText(drug.generic);

  if (!map.has(key)) {
    const aliases = buildAliases(drug);

    map.set(key, {
      ...drug,
      codeNorm: normalizeCode(drug.code),
      aliases,
      searchText: aliases.join(" ")
    });
  }
}

function buildAliases(drug) {
  const fields = [drug.code, drug.brand, drug.generic];
  const aliases = new Set();

  fields.forEach(field => {
    const raw = clean(field);
    const norm = normalizeText(raw);

    if (!raw) return;

    aliases.add(norm);
    aliases.add(norm.replace(/[^a-z0-9\u4e00-\u9fff]/gi, ""));

    norm.split(/[\s\/\-\(\),.;:+]+/).forEach(part => {
      if (part) aliases.add(part);
    });
  });

  return Array.from(aliases).filter(Boolean);
}

function makeKey(codeA, codeB) {
  return `${normalizeCode(codeA)}|${normalizeCode(codeB)}`;
}

function levenshtein(a, b) {
  a = normalizeText(a);
  b = normalizeText(b);

  const matrix = Array.from({ length: b.length + 1 }, () => []);

  for (let i = 0; i <= b.length; i++) matrix[i][0] = i;
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      matrix[i][j] =
        b[i - 1] === a[j - 1]
          ? matrix[i - 1][j - 1]
          : Math.min(
              matrix[i - 1][j - 1] + 1,
              matrix[i][j - 1] + 1,
              matrix[i - 1][j] + 1
            );
    }
  }

  return matrix[b.length][a.length];
}

function scoreAlias(query, alias) {
  const q = normalizeText(query);
  const a = normalizeText(alias);

  if (!q || !a) return 0;

  const qCompact = q.replace(/[^a-z0-9\u4e00-\u9fff]/gi, "");
  const aCompact = a.replace(/[^a-z0-9\u4e00-\u9fff]/gi, "");

  if (a === q) return 120;
  if (aCompact === qCompact) return 115;
  if (a.startsWith(q)) return 100;
  if (aCompact.startsWith(qCompact)) return 95;
  if (a.includes(q)) return 80;
  if (aCompact.includes(qCompact)) return 78;

  if (q.length >= 2 && a.startsWith(q[0])) {
    const dist = levenshtein(q, a.slice(0, Math.max(q.length, 3)));
    if (dist <= 1) return 65;
  }

  if (q.length >= 3) {
    const dist = levenshtein(q, a);
    const ratio = dist / Math.max(q.length, a.length);

    if (dist <= 2) return 60 - dist * 8;
    if (ratio <= 0.35) return 45;
  }

  return 0;
}

function searchDrugs(keyword) {
  const q = normalizeText(keyword);
  if (!q) return [];

  return drugIndex
    .map(drug => {
      const score = Math.max(...drug.aliases.map(alias => scoreAlias(q, alias)));
      return { ...drug, score };
    })
    .filter(drug => drug.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 12);
}

function setupAutocomplete(inputId, suggestionId, drugNumber) {
  const input = document.getElementById(inputId);
  const suggestionBox = document.getElementById(suggestionId);

  input.addEventListener("input", () => {
    const keyword = input.value.trim();

    if (drugNumber === 1) selectedDrug1 = null;
    if (drugNumber === 2) selectedDrug2 = null;

    if (!keyword) {
      suggestionBox.style.display = "none";
      suggestionBox.innerHTML = "";
      return;
    }

    const matches = searchDrugs(keyword);
    renderSuggestions(suggestionBox, matches, drugNumber);
  });

  input.addEventListener("focus", () => {
    if (input.value.trim()) {
      input.dispatchEvent(new Event("input"));
    }
  });
}

function renderSuggestions(suggestionBox, matches, drugNumber) {
  if (matches.length === 0) {
    suggestionBox.innerHTML = `
      <div class="suggestion-item">
        <div class="drug-brand">查無候選藥品</div>
        <div class="drug-meta">請改用處置代碼、商品名或成分名片段</div>
      </div>
    `;
    suggestionBox.style.display = "block";
    return;
  }

  suggestionBox.dataset.matches = JSON.stringify(matches);

  suggestionBox.innerHTML = matches.map((drug, index) => `
    <div class="suggestion-item" onclick="selectDrug(${drugNumber}, ${index})">
      <div class="drug-brand">${escapeHtml(drug.brand || "未列商品名")}</div>
      <div class="drug-meta">
        成分：${escapeHtml(drug.generic || "未列成分名")}
        ｜代碼：${escapeHtml(drug.code || "-")}
      </div>
    </div>
  `).join("");

  suggestionBox.style.display = "block";
}

function selectDrug(drugNumber, index) {
  const suggestionBox = document.getElementById(
    drugNumber === 1 ? "suggestions1" : "suggestions2"
  );

  const matches = JSON.parse(suggestionBox.dataset.matches || "[]");
  const drug = matches[index];

  if (!drug) return;

  if (drugNumber === 1) {
    selectedDrug1 = drug;
    document.getElementById("drugInput1").value =
      `${drug.brand || drug.generic || drug.code}`;
    document.getElementById("suggestions1").style.display = "none";
  } else {
    selectedDrug2 = drug;
    document.getElementById("drugInput2").value =
      `${drug.brand || drug.generic || drug.code}`;
    document.getElementById("suggestions2").style.display = "none";
  }
}

function checkCompatibility() {
  const resultDiv = document.getElementById("result");

  if (!selectedDrug1) {
    selectedDrug1 = searchDrugs(document.getElementById("drugInput1").value)[0] || null;
  }

  if (!selectedDrug2) {
    selectedDrug2 = searchDrugs(document.getElementById("drugInput2").value)[0] || null;
  }

  if (!selectedDrug1 || !selectedDrug2) {
    resultDiv.style.display = "block";
    resultDiv.innerHTML = renderError("請先輸入並選擇兩個藥品。");
    return;
  }

  const record = compatibilityMap[makeKey(selectedDrug1.code, selectedDrug2.code)];

  resultDiv.style.display = "block";

  if (!record) {
    resultDiv.innerHTML = renderNoData(selectedDrug1, selectedDrug2);
    return;
  }

  resultDiv.innerHTML = renderResult(selectedDrug1, selectedDrug2, record);
}

function renderResult(d1, d2, record) {
  const badgeClass = getBadgeClass(record.compatible);

  return `
    <div class="result-box">
      <div class="result-title">查詢結果</div>

      <div class="pair">
        <strong>${escapeHtml(d1.brand)}</strong>
        <span>（${escapeHtml(d1.generic)}｜${escapeHtml(d1.code)}）</span>
        <br>+<br>
        <strong>${escapeHtml(d2.brand)}</strong>
        <span>（${escapeHtml(d2.generic)}｜${escapeHtml(d2.code)}）</span>
      </div>

      <div class="badge ${badgeClass}">
        ${escapeHtml(record.compatible)}
      </div>

      <table class="info-table">
        <tr><th>Source</th><td>${escapeHtml(record.source || "Micromedex")}</td></tr>
        <tr><th>UpdatedAt</th><td>${escapeHtml(record.updatedAt || "未標示")}</td></tr>
        <tr><th>Note</th><td>${escapeHtml(record.note || "—")}</td></tr>
      </table>
    </div>
  `;
}

function renderNoData(d1, d2) {
  return `
    <div class="result-box">
      <div class="result-title">查無相容性資料</div>
      <div class="pair">
        ${escapeHtml(d1.brand || d1.generic || d1.code)}
        +
        ${escapeHtml(d2.brand || d2.generic || d2.code)}
      </div>
      <div class="badge unknown">無資料</div>
      <div class="footer-note">
        建議確認是否為院內尚未建檔組合，或回查 Micromedex / 院內 SOP。
      </div>
    </div>
  `;
}

function renderError(message) {
  return `
    <div class="result-box">
      <div class="badge caution">${escapeHtml(message)}</div>
    </div>
  `;
}

function getBadgeClass(value) {
  const v = normalizeText(value);

  if (v.includes("incompatible") || v.includes("不相容") || v === "no") {
    return "incompatible";
  }

  if (v.includes("compatible") || v.includes("相容") || v === "yes") {
    return "compatible";
  }

  if (
    v.includes("caution") ||
    v.includes("variable") ||
    v.includes("uncertain") ||
    v.includes("未測試") ||
    v.includes("unknown")
  ) {
    return "caution";
  }

  return "unknown";
}

function resetForm() {
  selectedDrug1 = null;
  selectedDrug2 = null;

  document.getElementById("drugInput1").value = "";
  document.getElementById("drugInput2").value = "";
  document.getElementById("suggestions1").style.display = "none";
  document.getElementById("suggestions2").style.display = "none";
  document.getElementById("result").style.display = "none";
}

document.addEventListener("click", function(e) {
  if (!e.target.closest(".input-wrap")) {
    document.getElementById("suggestions1").style.display = "none";
    document.getElementById("suggestions2").style.display = "none";
  }
});

setupAutocomplete("drugInput1", "suggestions1", 1);
setupAutocomplete("drugInput2", "suggestions2", 2);
loadData();
</script>
</body>
</html>
